name: Cross-SDK E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * *'

concurrency:
  group: tether-name-e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        track: [stable, latest]

    env:
      TETHER_E2E_API_KEY: ${{ secrets.TETHER_E2E_API_KEY }}
      TETHER_E2E_API_BASE_URL: https://api.tether.name
      E2E_TRACK: ${{ matrix.track }}
      PYTHON_SDK_STABLE_VERSION: '2.0.3'
      GO_SDK_STABLE_VERSION: 'v1.0.7'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate secret exists
        run: |
          if [ -z "${TETHER_E2E_API_KEY}" ]; then
            echo "TETHER_E2E_API_KEY is not set" >&2
            exit 1
          fi

      - name: Install Node deps (stable)
        if: matrix.track == 'stable'
        run: npm ci

      - name: Install Node deps (latest)
        if: matrix.track == 'latest'
        run: |
          npm ci
          npm install --no-save tether-name@latest tether-name-cli@latest tether-name-mcp-server@latest @modelcontextprotocol/sdk@latest

      - name: Install Python deps (stable)
        if: matrix.track == 'stable'
        run: |
          python -m pip install --upgrade pip
          pip install "tether-name==${PYTHON_SDK_STABLE_VERSION}"

      - name: Install Python deps (latest)
        if: matrix.track == 'latest'
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade tether-name

      - name: Prepare Go deps (stable)
        if: matrix.track == 'stable'
        run: go mod download

      - name: Prepare Go deps (latest)
        if: matrix.track == 'latest'
        run: |
          go get github.com/tether-name/tether-name-go@latest
          go mod download

      - name: Run cross-sdk e2e
        run: npm run e2e

      - name: Upload summary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-summary-${{ matrix.track }}
          path: |
            e2e-summary.json
            e2e-summary.md

      - name: Add summary to workflow
        if: always()
        run: |
          echo "## Cross-SDK E2E (${E2E_TRACK})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f e2e-summary.md ]; then
            cat e2e-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
