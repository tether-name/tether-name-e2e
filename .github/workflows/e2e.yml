name: Cross-SDK E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * *'

concurrency:
  group: tether-name-e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      TETHER_E2E_API_KEY: ${{ secrets.TETHER_E2E_API_KEY }}
      TETHER_E2E_API_BASE_URL: https://api.tether.name

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate secret exists
        run: |
          if [ -z "${TETHER_E2E_API_KEY}" ]; then
            echo "TETHER_E2E_API_KEY is not set" >&2
            exit 1
          fi

      - name: Install Node deps
        run: npm ci

      - name: Install Python deps
        run: python -m pip install --upgrade pip && pip install tether-name

      - name: Download Go deps
        run: go mod download

      - name: Run cross-sdk e2e
        run: npm run e2e

      - name: Upload summary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-summary
          path: |
            e2e-summary.json
            e2e-summary.md

      - name: Add summary to workflow
        if: always()
        run: |
          if [ -f e2e-summary.md ]; then
            cat e2e-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
